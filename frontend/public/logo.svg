<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Luxury Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E3C4" />
      <stop offset="30%" stop-color="#D4A75F" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#EAD3AB" />
    </linearGradient>
  </defs>

  <!-- Gold Circular Border Frame -->
  <!-- Outer Solid Circle -->
  <circle cx="60" cy="60" r="54" stroke="url(#goldGrad)" stroke-width="2" />
  <!-- Middle Dashed Circle -->
  <circle cx="60" cy="60" r="49" stroke="url(#goldGrad)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.8" />
  <!-- Inner Solid Circle -->
  <circle cx="60" cy="60" r="45" stroke="url(#goldGrad)" stroke-width="0.8" />

  <!-- Top: Faceted Diamond Icon with Sparkles -->
  <g transform="translate(60, 24)" fill="url(#goldGrad)" stroke="url(#goldGrad)" stroke-width="1" stroke-linejoin="round">
    <polygon points="-8 -4, -4 -9, 4 -9, 8 -4, 0 6" fill="url(#goldGrad)" fill-opacity="0.25" />
    <polygon points="-8 -4, -4 -9, 0 -4" />
    <polygon points="4 -9, 8 -4, 0 -4" />
    <polygon points="-4 -9, 4 -9, 0 -4" />
    <polygon points="-8 -4, 0 -4, 0 6" />
    <polygon points="8 -4, 0 -4, 0 6" />
    <!-- Sparkle rays -->
    <line x1="0" y1="-13" x2="0" y2="-10" stroke-width="1.5" stroke-linecap="round" />
    <line x1="-12" y1="-4" x2="-9" y2="-4" stroke-width="1.5" stroke-linecap="round" />
    <line x1="9" y1="-4" x2="12" y2="-4" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Center: Clearly Readable "SS" Letters (Side-by-Side Luxury Serif Style) -->
  <!-- Left "S" -->
  <path d="M 53 48 C 51 41, 37 41, 37 49 C 37 57, 53 61, 53 71 C 53 79, 39 79, 37 72" 
        stroke="url(#goldGrad)" 
        stroke-width="6.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />

  <!-- Right "S" -->
  <path d="M 81 48 C 79 41, 65 41, 65 49 C 65 57, 81 61, 81 71 C 81 79, 67 79, 65 72" 
        stroke="url(#goldGrad)" 
        stroke-width="6.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />

  <!-- Bottom: Luxury Ornament (Symmetric Classical Scroll & Flourish) -->
  <g fill="url(#goldGrad)" stroke="url(#goldGrad)" stroke-width="1" stroke-linejoin="round">
    <!-- Left Leaf / Scroll -->
    <path d="M60 88 C50 86, 42 90, 36 94 C44 94, 52 92, 60 88 Z" />
    <!-- Right Leaf / Scroll -->
    <path d="M60 88 C70 86, 78 90, 84 94 C76 94, 68 92, 60 88 Z" />
    <!-- Center Gem / Accent -->
    <circle cx="60" cy="94" r="2" fill="url(#goldGrad)" stroke="none" />
    <!-- Lower flourish line -->
    <path d="M52 95 C56 98, 64 98, 68 95" fill="none" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
